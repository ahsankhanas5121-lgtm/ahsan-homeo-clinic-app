version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ahsan_clinic_postgres
    environment:
      POSTGRES_USER: ahsan_clinic
      POSTGRES_PASSWORD: clinic_secure_password_2024
      POSTGRES_DB: ahsan_homeo_clinic
      TZ: 'Asia/Karachi'
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ahsan_clinic"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clinic_network
    restart: unless-stopped

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ahsan_clinic_backend
    environment:
      DATABASE_URL: postgresql://ahsan_clinic:clinic_secure_password_2024@postgres:5432/ahsan_homeo_clinic
      SECRET_KEY: ${SECRET_KEY:-your-super-secret-key-change-this}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      ENVIRONMENT: production
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head &&
             python -m uvicorn app.main:app --host 0.0.0.0 --port 8000"
    networks:
      - clinic_network
    restart: unless-stopped

networks:
  clinic_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
